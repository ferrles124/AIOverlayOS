name: Build JARVIS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download proper Gradle wrapper
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.1.0/gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradlew \
            https://raw.githubusercontent.com/gradle/gradle/v8.1.0/gradlew
          chmod +x gradlew

      - name: Create launcher icons
        run: |
          sudo apt-get install -y imagemagick
          declare -A sizes
          sizes["mdpi"]=48
          sizes["hdpi"]=72
          sizes["xhdpi"]=96
          sizes["xxhdpi"]=144
          sizes["xxxhdpi"]=192
          for density in "${!sizes[@]}"; do
            size=${sizes[$density]}
            dir="app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert -size ${size}x${size} xc:"#020b14" \
              -fill "#3399ff" -draw "circle $((size/2)),$((size/2)) $((size/2)),$((size/4))" \
              -fill "#a0e4ff" -draw "circle $((size/2)),$((size/2)) $((size/2)),$((size*3/8))" \
              -fill "#ffffff" -draw "circle $((size/2)),$((size/2)) $((size/2)),$((size*9/20))" \
              "${dir}/ic_launcher.png"
            cp "${dir}/ic_launcher.png" "${dir}/ic_launcher_round.png"
          done

      - name: Download fonts
        run: |
          mkdir -p app/src/main/res/font

          # Orbitron Bold
          curl -L -o app/src/main/res/font/orbitron_bold.ttf \
            "https://github.com/google/fonts/raw/main/ofl/orbitron/Orbitron%5Bwght%5D.ttf"

          # Orbitron Regular (same variable font, rename)
          cp app/src/main/res/font/orbitron_bold.ttf \
             app/src/main/res/font/orbitron_regular.ttf

          # Share Tech Mono
          curl -L -o app/src/main/res/font/share_tech_mono.ttf \
            "https://github.com/google/fonts/raw/main/ofl/sharetechmono/ShareTechMono-Regular.ttf"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
